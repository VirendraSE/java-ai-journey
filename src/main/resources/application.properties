# Anthropic Claude API Key
spring.ai.anthropic.api-key=REPLACE_WITH_YOUR_API_KEY
spring.ai.anthropic.chat.options.model=claude-sonnet-4-20250514

# PDF document location (only for pre-loaded docs)
app.rag.pdf-path=classpath:docs/AI_ML_FAQ.pdf

server.port=8080

# Maximum size of a single file in request, Default limit is only 1MB
spring.servlet.multipart.max-file-size = 10MB

# This disables Tomcat?s internal limit, -1 means unlimited
server.tomcat.max-swallow-size=-1

# Logging Configuration

# Log levels
logging.level.root=INFO
logging.level.com.github.virendra.java_ai_journey=DEBUG
# Log file location and name
logging.file.name=logs/java-ai-journey.log
# Max size of each log file before it rolls over
logging.logback.rollingpolicy.max-file-size=10MB
# How many days to keep log files
logging.logback.rollingpolicy.max-history=30
# Max total size of all log files combined
logging.logback.rollingpolicy.total-size-cap=100MB
# Log pattern for file
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %logger{40} - %msg%n
# Log pattern for console
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %logger{40} - %msg%n